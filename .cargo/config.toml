[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]

[target.x86_64-unknown-none]
rustflags = [
    "-C", "target-feature=-mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-3dnow,-3dnowa,+soft-float",
    
    "-C", "code-model=kernel",
    
    "-C", "link-arg=-gc-sections",
]

[profile.release]
opt-level = 3
lto = true
panic = "abort"